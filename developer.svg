<svg fill="none" viewBox="0 0 600 450" width="600" height="450" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .dev-scene { display: flex; align-items: center; justify-content: center; background: transparent; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 450px; padding-top: 20px;}
        .main-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        
        /* Màn hình máy tính */
        .monitor { background: #1a1b26; border: 4px solid #414868; border-radius: 12px; width: 260px; height: 210px; padding: 12px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .monitor-bar { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #414868; padding-bottom: 6px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
        .r { background: #ff5555; } .y { background: #ffb86c; } .g { background: #50fa7b; }
        .cl { font-family: 'Fira Code', monospace; font-size: 11px; margin-bottom: 3px; line-height: 1.5; }
        .purple { color: #bd93f9; } .white { color: #f8f8f2; } .orange { color: #ffb86c; } .green { color: #50fa7b; } .cyan { color: #8be9fd; } .muted { color: #6272a4; }
        
        .monitor-stand { width: 45px; height: 25px; background: #414868; }
        .monitor-base { width: 90px; height: 8px; background: #414868; border-radius: 4px; }
        
        /* Bàn phím Bling RGB */
        .keyboard-area { position: relative; margin-top: 8px; }
        .keyboard { background: #24283b; padding: 6px; border-radius: 6px; border: 1px solid #414868; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
        .rgb-glow { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 6px; filter: blur(10px); background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff); background-size: 200% 200%; animation: rainbow 3s linear infinite; z-index: 1; opacity: 0.6; }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .kb-row { display: flex; margin-bottom: 2px; }
        .key { width: 13px; height: 13px; background: #414868; border-radius: 3px; margin: 1px; font-size: 6px; color: #c0caf5; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .key.active { animation: key-press 1.5s infinite; }
        @keyframes key-press { 0%, 100% { background: #414868; } 50% { background: #7aa2f7; box-shadow: 0 0 5px #7aa2f7; } }
        .space { width: 85px; }
        
        /* Nhân vật đẹp trai xịn xò */
        .dev-char { width: 150px; position: absolute; right: -70px; bottom: 0; filter: drop-shadow(0 0 15px rgba(189, 147, 249, 0.3)); }
        
        #eyes { animation: blink 4s infinite; transform-origin: center; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        
        #arm-left, #arm-right { animation: typing 0.15s infinite alternate; }
        @keyframes typing { from { transform: translateY(0) rotate(0); } to { transform: translateY(2px) rotate(-1deg); } }
        
        .code-cursor { display: inline-block; width: 6px; height: 12px; background: #8be9fd; animation: flash 0.8s infinite; margin-left: 2px; vertical-align: middle; }
        @keyframes flash { 50% { opacity: 0; } }

        /* Hiệu ứng kính phát sáng */
        .glasses-lens { animation: lens-glow 2s infinite alternate; }
        @keyframes lens-glow { from { stroke: #8be9fd; stroke-width: 1.5; } to { stroke: #bd93f9; stroke-width: 2.5; filter: drop-shadow(0 0 5px #bd93f9); } }
      </style>

      <div class="dev-scene">
        <div class="main-container">
          <div class="monitor-wrap" style="display:flex; flex-direction:column; align-items:center;">
            <div class="monitor">
              <div class="monitor-bar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><span style="font-size:10px;color:#a9b1d6;margin-left:6px;font-weight:bold;">huyhoang@workspace</span></div>
              <div class="code-lines">
                <div class="cl purple">const <span class="cl white">dev</span> = {</div>
                <div class="cl" style="padding-left:12px"><span class="cl orange">name</span>: <span class="cl green">"Huy Hoàng"</span>,</div>
                <div class="cl" style="padding-left:12px"><span class="cl orange">focus</span>: <span class="cl cyan">["React", "Node", "OpenGL"]</span>,</div>
                <div class="cl" style="padding-left:12px"><span class="cl orange">goal</span>: <span class="cl green">"Fullstack Master"</span>,</div>
                <div class="cl purple">};</div>
                <div class="cl muted" style="margin-top:5px;">// Shipping code... 🚀</div>
                <div class="cl cyan">npm start <span class="code-cursor"></span></div>
              </div>
            </div>
            <div class="monitor-stand"></div>
            <div class="monitor-base"></div>
          </div>

          <div class="keyboard-area">
            <div class="rgb-glow"></div>
            <div class="keyboard">
              <div class="kb-row">
                <div class="key">Q</div><div class="key active" style="animation-delay: 0.2s">W</div><div class="key">E</div><div class="key">R</div><div class="key active" style="animation-delay: 0.5s">T</div><div class="key">Y</div><div class="key">U</div><div class="key active" style="animation-delay: 0.8s">I</div><div class="key">O</div><div class="key">P</div>
              </div>
              <div class="kb-row">
                <div class="key active" style="animation-delay: 0.1s">A</div><div class="key">S</div><div class="key active" style="animation-delay: 0.4s">D</div><div class="key">F</div><div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key active" style="animation-delay: 0.7s">L</div>
              </div>
              <div class="kb-row">
                <div class="key">Z</div><div class="key active" style="animation-delay: 0.3s">X</div><div class="key">C</div><div class="key">V</div><div class="key active" style="animation-delay: 0.6s">B</div><div class="key">N</div><div class="key">M</div>
              </div>
              <div class="kb-row"><div class="key space active" style="animation-delay: 1s"></div></div>
            </div>
          </div>

          <svg class="dev-char" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="blingGlow">
                <feGaussianBlur stdDeviation="2.5" in="SourceGraphic"/>
                <feMerge>
                  <feMergeNode/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(189, 147, 249, 0.2)" stroke-width="2" filter="url(#blingGlow)"/>
            <circle cx="50" cy="50" r="40" fill="rgba(189, 147, 249, 0.05)"/>
            
            <path d="M30 80 Q50 75 70 80 L75 120 L25 120 Z" fill="#24283b" stroke="#414868" stroke-width="1"/>
            <path d="M45 80 Q50 90 55 80" fill="none" stroke="#7aa2f7" stroke-width="2"/>
            
            <g id="arm-left">
              <path d="M10 85 L25 85 Q26 90 23 93 L8 93 Q5 90 10 85 Z" fill="#24283b" stroke="#414868" stroke-width="1"/>
              <path d="M12 91 Q14 94 16 91 Q18 94 20 91 L21 93 Q22 96 20 96 L11 96 Q9 96 10 93 Z" fill="#ffccaa"/> </g>
            <g id="arm-right">
              <path d="M75 85 L90 85 Q93 90 90 93 L75 93 Q72 90 75 85 Z" fill="#24283b" stroke="#414868" stroke-width="1"/>
              <path d="M77 91 Q79 94 81 91 Q83 94 85 91 L86 93 Q87 96 85 96 L76 96 Q74 96 75 93 Z" fill="#ffccaa"/> </g>
            
            <rect x="44" y="68" width="12" height="15" rx="5" fill="#ffccaa"/>
            <ellipse cx="50" cy="55" rx="20" ry="22" fill="#ffccaa"/>
            
            <path d="M30 50 Q28 30 45 25 Q60 25 70 32 L72 48 Q65 52 60 42 Q55 40 50 40 Q45 40 40 42 Z" fill="#5D4037"/>
            <path d="M35 45 Q40 33 50 31 Q60 33 68 45 Q63 40 50 40 Z" fill="#8D6E63" opacity="0.9"/>
            <path d="M40 40 Q50 37 60 40 Q55 38 50 38 Z" fill="#BCAAA4" opacity="0.7"/>

            <path d="M28 55 A 22 22 0 0 1 72 55" fill="none" stroke="#414868" stroke-width="4" stroke-linecap="round"/>
            <rect x="25" y="50" width="8" height="15" rx="3" fill="#1a1b26"/>
            <rect x="67" y="50" width="8" height="15" rx="3" fill="#1a1b26"/>

            <path class="glasses-wire" d="M38 52 Q43 48 48 52 L52 52 Q57 48 62 52 Q64 56 62 60 Q57 64 52 60 L48 60 Q43 64 38 60 Q36 56 38 52 Z" fill="none" stroke="#67e8f9" stroke-width="0.8"/>
            <path class="glasses-lens" d="M38 52 Q43 48 48 52 Q43 64 38 60 Z" fill="rgba(139, 233, 253, 0.2)" stroke="#8be9fd" stroke-width="1.5"/>
            <path class="glasses-lens" d="M52 52 Q57 48 62 52 Q57 64 52 60 Z" fill="rgba(139, 233, 253, 0.2)" stroke="#8be9fd" stroke-width="1.5"/>
            <line x1="48" y1="56" x2="52" y2="56" stroke="#8be9fd" stroke-width="1"/>
            
            <g id="eyes">
              <path d="M40 56 Q43 54 46 56 Q43 60 40 56 Z" fill="#1e1e3f"/>
              <path d="M54 56 Q57 54 60 56 Q57 60 54 56 Z" fill="#1e1e3f"/>
              <circle cx="43" cy="56" r="1.2" fill="white"/> <circle cx="57" cy="56" r="1.2" fill="white"/> </g>
            <path d="M44 65 Q50 71 56 65" fill="none" stroke="#1e1e3f" stroke-width="1.8" stroke-linecap="round"/> <rect x="12" y="105" width="12" height="15" rx="2" fill="#f8f8f2" stroke="#d1d5db" stroke-width="0.5"/>
            <path d="M24 108 L28 108 Q30 110 28 112 L24 112 Z" fill="#f8f8f2" stroke="#d1d5db" stroke-width="0.5"/>
            
            <path d="M16 102 Q17 98 16 94 Q17 90 16 86 Q17 82 16 78" fill="none" stroke="white" stroke-width="1" opacity="0.6">
              <animate attributeName="d" dur="2s" repeatCount="indefinite" values="M16 102 Q17 98 16 94 Q17 90 16 86 Q17 82 16 78;M16 102 Q18 98 17 94 Q18 90 17 86 Q18 82 17 78;M16 102 Q17 98 16 94 Q17 90 16 86 Q17 82 16 78"/>
            </path>
            
            <text x="80" y="50" font-size="9" fill="#8be9fd" opacity="0.8" font-family="monospace">&lt;/&gt;</text>
            <text x="5" y="65" font-size="8" fill="#bd93f9" opacity="0.7" font-family="monospace">{}</text>
            <text x="85" y="75" font-size="8" fill="#50fa7b" opacity="0.7" font-family="monospace">=&gt;</text>
            
            <g fill="rgba(189, 147, 249, 0.7)">
              <circle cx="15" cy="40" r="1.5"><animate attributeName="cy" dur="3s" repeatCount="indefinite" values="40;20;40"/><animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.7;0;0.7"/></circle>
              <circle cx="85" cy="30" r="2"><animate attributeName="cy" dur="4s" repeatCount="indefinite" values="30;10;30"/><animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.7;0;0.7"/></circle>
              <circle cx="20" cy="20" r="1"><animate attributeName="cy" dur="2.5s" repeatCount="indefinite" values="20;5;20"/><animate attributeName="opacity" dur="2.5s" repeatCount="indefinite" values="0.7;0;0.7"/></circle>
              <circle cx="90" cy="45" r="1.8"><animate attributeName="cy" dur="3.5s" repeatCount="indefinite" values="45;25;45"/><animate attributeName="opacity" dur="3.5s" repeatCount="indefinite" values="0.7;0;0.7"/></circle>
              <circle cx="10" cy="55" r="1.2"><animate attributeName="cy" dur="3s" repeatCount="indefinite" values="55;35;55"/><animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.7;0;0.7"/></circle>
            </g>

            <animateTransform attributeName="transform" type="translate" additive="sum" id="char-bounce" dur="1s" repeatCount="indefinite" values="0,0;0,1;0,0" calcMode="discrete"/>
          </svg>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
